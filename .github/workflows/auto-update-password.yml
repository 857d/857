
name: Auto Update Multiple Blog Passwords

on:
  schedule:
    # 每天北京时间 0:30 执行（UTC 16:30）
    - cron: '30 16 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 显式授予写权限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update passwords
        run: node .github/scripts/update_passwords.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只提交配置文件，避免提交其他无关文件
          git add public/blogs/*/post_config.json
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "没有需要提交的变更"
          else
            git commit -m "chore: auto-update blog passwords $(date +'%Y-%m-%d')"
            git push
          fi
