
name: Auto Update All Blog Passwords

on:
  # 定时任务（备用，可能不触发，但保留）
  schedule:
    - cron: '0 4,16 * * *'   # UTC 4:00 和 16:00 → 北京时间 12:00 和 24:00
  # 手动触发（网页上点 Run workflow）
  workflow_dispatch:

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate and update passwords
        run: |
          # 确保 public 目录存在
          mkdir -p public
          
          # 处理没有匹配文件的情况
          shopt -s nullglob
          configs=(public/blogs/*/config.json)
          
          if [ ${#configs[@]} -eq 0 ]; then
            echo '{"info": "No articles yet"}' > public/daily_passwords.json
            echo "⚠️ No config.json found, created empty daily_passwords.json"
            exit 0
          fi
          
          # 开始构建汇总 JSON
          echo "{" > public/daily_passwords.json
          
          for config in "${configs[@]}"; do
            dir=$(dirname "$config")
            article_id=$(basename "$dir")
            
            # 生成 1000-9999 随机密码
            new_pw=$(( RANDOM % 9000 + 1000 ))
            
            # 更新文章自身的 config.json
            jq --arg pw "$new_pw" '.password = $pw' "$config" > tmp.json && mv tmp.json "$config"
            
            # 提取标题
            title=$(jq -r '.title' "$config")
            
            # 写入汇总
            echo "  \"$article_id\": {" >> public/daily_passwords.json
            echo "    \"title\": \"$title\"," >> public/daily_passwords.json
            echo "    \"password\": \"$new_pw\"" >> public/daily_passwords.json
            echo "  }," >> public/daily_passwords.json
            
            echo "✅ Updated $article_id -> $new_pw"
          done
          
          # 去掉最后一个逗号，闭合 JSON
          sed -i '$ s/,$//' public/daily_passwords.json
          echo "}" >> public/daily_passwords.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blogs/*/config.json public/daily_passwords.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update all blog passwords $(date -u +'%Y-%m-%d %H:%M')"
            git push
          fi
