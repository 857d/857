
name: Auto Update TikTok Password

on:
  schedule:
    # 每天 UTC 16:30 运行（北京时间次日 0:30）
    - cron: '30 16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-password:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate random 1-9999 password
        id: gen_pw
        run: |
          # 生成 1-9999 之间的随机数
          RANDOM_PW=$(shuf -i 1-9999 -n 1)
          echo "RANDOM_PW=$RANDOM_PW" >> $GITHUB_ENV
          echo "Generated password: $RANDOM_PW"

      - name: Update config.json with new password
        run: |
          jq --arg new_pw "${{ env.RANDOM_PW }}" '.password = $new_pw' \
            public/blogs/2026tiktok/config.json > tmp.json && mv tmp.json public/blogs/2026tiktok/config.json

      - name: Write today's password to public file
        run: |
          echo "${{ env.RANDOM_PW }}" > public/daily_password.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blogs/2026tiktok/config.json public/daily_password.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update password to ${{ env.RANDOM_PW }}"
            git push
          fi
