name: Auto Update All Blog Passwords

on:
  workflow_dispatch:

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (if needed)
        run: sudo apt-get install -y jq

      - name: Generate and update passwords
        run: |
          # 创建密码汇总文件
          echo "{" > public/daily_passwords.json
          
          # 遍历所有 config.json 文件
          for config in public/blogs/*/config.json; do
            if [ -f "$config" ]; then
              # 提取文章文件夹名（用作标识）
              dir=$(dirname "$config")
              article_id=$(basename "$dir")
              
              # 生成 1-9999 之间的随机密码
              new_pw=$(shuf -i 1-9999 -n 1)
              
              # 更新 config.json 中的 password
              jq --arg pw "$new_pw" '.password = $pw' "$config" > tmp.json && mv tmp.json "$config"
              
              # 提取文章标题（用于密码表）
              title=$(jq -r '.title' "$config")
              
              # 将文章标题和密码写入汇总文件
              echo "  \"$article_id\": {" >> public/daily_passwords.json
              echo "    \"title\": \"$title\"," >> public/daily_passwords.json
              echo "    \"password\": \"$new_pw\"" >> public/daily_passwords.json
              echo "  }," >> public/daily_passwords.json
              
              echo "✅ Updated $article_id -> $new_pw"
            fi
          done
          
          # 去掉最后一个逗号，并关闭 JSON 对象
          sed -i '$ s/,$//' public/daily_passwords.json
          echo "}" >> public/daily_passwords.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blogs/*/config.json public/daily_passwords.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update all blog passwords $(date -u +'%Y-%m-%d')"
            git push
          fi
