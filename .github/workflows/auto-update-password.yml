
name: Auto Update TikTok Post Password

on:
  schedule:
    # 每天北京时间 0:30 运行（UTC 16:30）
    - cron: '30 16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-password:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 确保有写入权限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update password in config
        run: node .github/scripts/update_password.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blogs/2026tiktok/post_config.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update TikTok post password $(date +'%Y-%m-%d')" && git push)
