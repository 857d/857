
name: Auto Update TikTok Password

on:
  schedule:
    # 每天 UTC 16:30 运行（北京时间次日 0:30）
    - cron: '30 16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-password:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update password in config.json
        run: |
          # 生成基于日期的密码：年月日 + 固定后缀（示例：20260401_blog）
          TODAY=$(date -u +'%Y%m%d')
          NEW_PASSWORD="${TODAY}_blog"
          
          # 修改 config.json 中的 password 字段
          # 使用 jq 工具处理 JSON（runner 已预装）
          jq --arg new_pw "$NEW_PASSWORD" '.password = $new_pw' \
            public/blogs/2026tiktok/config.json > tmp.json && mv tmp.json public/blogs/2026tiktok/config.json
          
          echo "✅ 密码已更新为: $NEW_PASSWORD"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/blogs/2026tiktok/config.json
          if git diff --cached --quiet; then
            echo "没有需要提交的变更"
          else
            git commit -m "chore: auto-update password $(date -u +'%Y-%m-%d')"
            git push
          fi
