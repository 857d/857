name: 24小时自动更新密码
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 生成随机密码 (1-9999)
        run: |
          NEW_PWD=$((1 + RANDOM % 9999))
          echo "新密码：$NEW_PWD"

      - name: 直接修改 JSON 文件
        run: |
          NEW_PWD=$((1 + RANDOM % 9999))
          cat > blogs/2026tiktok.json <<EOF
          {
            "title": "2026TikTok免拔卡就能刷国际版抖音视频规则和方法（苹果和安卓通用）",
            "tags": [],
            "date": "2026-03-26T20:39",
            "summary": "",
            "cover": "/blogs/2026tiktok/220f6df697cd08c0.png",
            "hidden": false,
            "category": "笔记",
            "downloadLinks": [],
            "passwordProtected": true,
            "password": "$NEW_PWD"
          }
          EOF

      - name: 提交更新
        run: |
          git config --global user.name "auto"
          git config --global user.email "auto@github.com"
          git add .
          git commit -m "✅ 自动更新每日密码：$NEW_PWD"
          git push
