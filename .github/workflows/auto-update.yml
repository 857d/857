name: 24小时自动更新密码
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 更新密码
        run: |
          NEW_PWD=$(echo $((RANDOM % 9999 + 1)))
          echo "新密码：$NEW_PWD"

          cat > blogs/2026tiktok.json <<EOF
          {
            "title": "2026TikTok免拔卡就能刷国际版抖音视频规则和方法（苹果和安卓通用）",
            "tags": [],
            "date": "2026-03-26T20:39",
            "summary": "",
            "cover": "/blogs/2026tiktok/220f6df697cd08c0.png",
            "hidden": false,
            "category": "笔记",
            "downloadLinks": [],
            "passwordProtected": true,
            "password": "$NEW_PWD"
          }
          EOF

      - name: 提交
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "每日密码更新：$NEW_PWD"
          git push
