name: update-pwd
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: 生成密码
        run: |
          PWD=$(echo $((RANDOM%9999+1)))
          echo "PWD=$PWD" >> $GITHUB_ENV

      - name: 修改JSON密码
        run: |
          cat > blogs/2026tiktok.json <<EOF
{
  "title": "2026TikTok免拔卡就能刷国际版抖音视频规则和方法（苹果和安卓通用）",
  "tags": [],
  "date": "2026-03-26T20:39",
  "summary": "",
  "cover": "/blogs/2026tiktok/220f6df697cd08c0.png",
  "hidden": false,
  "category": "笔记",
  "downloadLinks": [],
  "passwordProtected": true,
  "password": "$PWD"
}
EOF

      - name: 提交
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "密码 $PWD"
          git push
