name: 24小时自动更新密码
on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00 自动更新
  workflow_dispatch:  # 允许手动点一下测试

jobs:
  update-password:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行密码更新脚本
        run: node update-password.js

      - name: 提交到 GitHub
        run: |
          git config --global user.name "Auto Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "🔐 自动更新每日密码 $(date +'%Y-%m-%d')"
          git push
