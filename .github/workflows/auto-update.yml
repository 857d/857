name: UpdatePassword
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate password
        run: echo "PWD=$((RANDOM%9999+1))" >> $GITHUB_ENV

      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Only update password
        run: |
          PWD="${{ env.PWD }}"
          FILE="public/blogs/2026tiktok/post_config.json"
          sed -i "s/\"password\": \"[0-9]*\"/\"password\": \"$PWD\"/" "$FILE"
          git add "$FILE"
          git commit -m "密码已更新：$PWD" || echo "无变化，跳过提交"
          git push
