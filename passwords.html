
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日密码一览</title>
    <style>
        /* 你的原有样式保持不变，增加一个按钮样式 */
        .refresh-btn {
            display: block;
            margin: 10px auto 0;
            padding: 6px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .refresh-btn:hover { background: #45a049; }
        .countdown { font-size: 0.7em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>📋 今日文章访问密码</h1>
    <div class="update-time" id="updateTime">加载中...</div>
    <table id="passwordTable">...</table>
    <div class="footer">密码每日自动更新，点击复制按钮即可复制密码。</div>
    <div class="auto-refresh-note">⏱️ 页面每小时自动获取最新密码</div>
    <button class="refresh-btn" id="manualRefresh">🔄 手动刷新密码</button>
    <div class="countdown" id="countdown"></div>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        let refreshInterval = null;
        let countdownInterval = null;

        async function loadPasswords() {
            try {
                const timestamp = Date.now();
                const response = await fetch(`public/daily_passwords.json?t=${timestamp}`);
                if (!response.ok) throw new Error('无法加载密码文件');
                const data = await response.json();
                
                const now = new Date();
                document.getElementById('updateTime').innerHTML = `更新日期：${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}<br><span style="font-size:0.8em;">最后加载：${now.toLocaleTimeString()}</span>`;
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                for (const [key, article] of Object.entries(data)) {
                    const row = tbody.insertRow();
                    const cellTitle = row.insertCell(0);
                    const cellPw = row.insertCell(1);
                    cellTitle.innerText = article.title;
                    cellPw.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="password">${escapeHtml(article.password)}</span>
                            <button class="copy-btn" data-password="${escapeHtml(article.password)}">📋 复制</button>
                        </div>
                    `;
                }
                if (Object.keys(data).length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2">暂无密码数据</td></tr>';
                }
                // 重置倒计时显示
                if (refreshInterval) {
                    updateCountdownDisplay();
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="2" class="error">加载失败，请稍后重试。</td></tr>';
                document.getElementById('updateTime').innerHTML = '数据加载失败';
            }
        }

        function updateCountdownDisplay() {
            if (countdownInterval) clearInterval(countdownInterval);
            const countdownEl = document.getElementById('countdown');
            const updateCountdown = () => {
                if (!nextRefreshTime) return;
                const now = Date.now();
                const remaining = nextRefreshTime - now;
                if (remaining <= 0) {
                    countdownEl.innerText = '即将刷新...';
                    return;
                }
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                countdownEl.innerText = `下次自动刷新：${minutes}分${seconds}秒后`;
            };
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        let nextRefreshTime = null;
        function startAutoRefresh(intervalMs) {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                nextRefreshTime = Date.now() + intervalMs;
                loadPasswords();
            }, intervalMs);
            nextRefreshTime = Date.now() + intervalMs;
            updateCountdownDisplay();
        }

        // 初始化：加载数据 + 启动自动刷新（1小时）
        loadPasswords();
        startAutoRefresh(3600000);

        // 手动刷新按钮
        document.getElementById('manualRefresh').addEventListener('click', () => {
            loadPasswords();
            // 重置计时器，让下一次自动刷新从当前时间重新计时
            if (refreshInterval) {
                clearInterval(refreshInterval);
                startAutoRefresh(3600000);
            }
        });
    </script>

        // 复制功能（保持不变，略...）
        async function copyToClipboard(text, button) { /* 你的原有代码 */ }
        function showCopySuccess(button) { /* 你的原有代码 */ }
        document.addEventListener('click', (e) => { /* 你的原有代码 */ });
    </script>
</body>
</html>
